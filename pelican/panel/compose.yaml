services:
  panel:
    image: ghcr.io/pelican-dev/panel:latest
    container_name: pelican_panel
    restart: always
    networks:
      - proxy-nw
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pelican-data:/pelican-data
      - pelican-logs:/var/www/html/storage/logs
      - ./Caddyfile:/etc/caddy/Caddyfile
    environment:
      - XDG_DATA_HOME=/pelican-data
      - APP_URL="https://panel.danxliu.com"
      - ADMIN_EMAIL="danxliu@protonmail.com"
      - CADDY_EMAIL="danxliu@protonmail.com"
      - TRUSTED_PROXIES=*
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/pelican-data/database.sqlite

volumes:
  pelican-data:
  pelican-logs:

networks:
  proxy-nw:
    external: true
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
